name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: read

jobs:
  test-and-sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Test (JUnit)
        run: ./mvnw -B test

      - name: SonarCloud 
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw -B sonar:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${SONAR_TOKEN}

  docker-compose-despliegue-simulado:
    runs-on: ubuntu-latest
    needs: test-and-sonar
    steps:
      - uses: actions/checkout@v6

      - name: Construir imagen Docker
        run: docker build -t notes-api:${{ github.sha }} .

      - name: Levantar entorno simulado
        run: docker compose up -d --build

      - name: Smoke test (GET /api/notas)
        run: |
          for i in {1..20}; do
            if curl -fsS http://localhost:8080/api/notas > /dev/null; then
              echo "API OK"
              exit 0
            fi
            echo "Esperando API..."
            sleep 2
          done
          echo "La API no inició"
          docker compose logs
          exit 1

      - name: Detener entorno simulado
        if: always()
        run: docker compose down