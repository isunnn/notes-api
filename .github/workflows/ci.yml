name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: read

jobs:
  test-and-sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Test (JUnit)
        run: ./mvnw -B test

      - name: SonarCloud 
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw -B sonar:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${SONAR_TOKEN} \
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }} \
            -Dsonar.pullrequest.branch=${{ github.head_ref }} \
            -Dsonar.pullrequest.base=${{ github.base_ref }}

      - name: Verificar Quality Gate
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sleep 30
          RESPONSE=$(curl -s -w "\n%{http_code}" -u $SONAR_TOKEN: "https://sonarcloud.io/api/qualitygates/project_status?projectKey=${{ secrets.SONAR_PROJECT_KEY }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP Code: $HTTP_CODE"
          echo "Response: $BODY"
          STATUS=$(echo "$BODY" | grep -o '"status":"[^"]*"' | cut -d'"' -f4)
          echo "Quality Gate status: $STATUS"
          if [ "$STATUS" != "OK" ]; then
            echo "Quality Gate FAILED - pipeline detenido"
            exit 1
          fi
          echo "Quality Gate PASSED"

  lint-dockerfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: dockerfile
          failure-threshold: warning

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ejecutar auditoria
        run: chmod +x scripts/audit.sh && ./scripts/audit.sh

  docker-compose-despliegue-simulado:
    runs-on: ubuntu-latest
    needs: [test-and-sonar, lint-dockerfile, audit]
    steps:
      - uses: actions/checkout@v4

      - name: Construir imagen Docker
        run: docker build -t notes-api:${{ github.sha }} .

      - name: Levantar entorno simulado
        run: docker compose up -d --build

      - name: Smoke test (GET /api/notas)
        run: |
          for i in {1..20}; do
            if curl -fsS http://localhost:8080/api/notas > /dev/null; then
              echo "API OK"
              exit 0
            fi
            echo "Esperando API..."
            sleep 2
          done
          echo "La API no inició"
          docker compose logs
          exit 1

      - name: Detener entorno simulado
        if: always()
        run: docker compose down