name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: read

jobs:
  test-and-sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Test (JUnit)
        run: ./mvnw -B test

      - name: SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw -B sonar:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${SONAR_TOKEN} \
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }} \
            -Dsonar.pullrequest.branch=${{ github.head_ref }} \
            -Dsonar.pullrequest.base=${{ github.base_ref }}

      - name: Verificar Quality Gate
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sleep 30
          RESPONSE=$(curl -s -w "\n%{http_code}" -u $SONAR_TOKEN: "https://sonarcloud.io/api/qualitygates/project_status?projectKey=${{ secrets.SONAR_PROJECT_KEY }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP Code: $HTTP_CODE"
          echo "Response: $BODY"
          STATUS=$(echo "$BODY" | grep -o '"status":"[^"]*"' | head -1 | cut -d'"' -f4)
          echo "Quality Gate status: $STATUS"
          if [ "$STATUS" != "OK" ]; then
            echo "Quality Gate FAILED - pipeline detenido"
            exit 1
          fi
          echo "Quality Gate PASSED"

  lint-dockerfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: dockerfile
          failure-threshold: warning

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ejecutar auditoria
        run: chmod +x scripts/audit.sh && ./scripts/audit.sh

  deploy-eks:
    runs-on: ubuntu-latest
    needs: [test-and-sonar, lint-dockerfile, audit]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Configurar AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login a ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y push imagen
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG=${{ github.sha }}
          docker build -t $ECR_REGISTRY/notes-api:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/notes-api:$IMAGE_TAG $ECR_REGISTRY/notes-api:latest
          docker push $ECR_REGISTRY/notes-api:$IMAGE_TAG
          docker push $ECR_REGISTRY/notes-api:latest

      - name: Configurar kubectl
        run: aws eks update-kubeconfig --name notes-api-cluster --region us-east-1

      - name: Desplegar en EKS
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG=${{ github.sha }}
          sed -i "s|056172563599.dkr.ecr.us-east-1.amazonaws.com/notes-api:latest|$ECR_REGISTRY/notes-api:$IMAGE_TAG|g" k8s/deployment.yaml
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/hpa.yaml

      - name: Instalar Istio
        run: |
          ISTIO_VERSION="1.30.2"
          curl -L https://github.com/istio/istio/releases/download/$ISTIO_VERSION/istio-$ISTIO_VERSION-linux-amd64.tar.gz | tar xz
          export PATH=$PWD/istio-$ISTIO_VERSION/bin:$PATH
          istioctl install --set profile=demo -y
          kubectl label namespace notes-api istio-injection=enabled --overwrite

      - name: Aplicar configuración Istio
        run: |
          kubectl apply -f k8s/istio/gateway.yaml
          kubectl apply -f k8s/istio/virtualservice.yaml
          kubectl apply -f k8s/istio/destinationrule.yaml

      - name: Esperar rollout
        run: kubectl -n notes-api rollout status deployment/notes-api --timeout=180s

      - name: Pruebas de aceptación
        run: |
          chmod +x scripts/acceptance-test.sh
          kubectl port-forward -n notes-api svc/notes-api 8080:80 &
          sleep 10
          ./scripts/acceptance-test.sh http://localhost:8080

      - name: Verificar Istio
        run: |
          kubectl -n notes-api get gateway
          kubectl -n notes-api get virtualservice
          kubectl -n notes-api get destinationrule

      - name: Verificar CloudWatch
        run: kubectl get pods -n amazon-cloudwatch

      - name: Cleanup en caso de error
        if: failure()
        run: kubectl -n notes-api rollout undo deployment/notes-api